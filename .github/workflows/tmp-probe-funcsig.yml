# TEMPORARY: probe MSVC __FUNCSIG__ formatting under /Od vs /O2 to diagnose
# the Boost 1.91 type_info.hpp pattern-match failure. Delete before merging.

name: "Probe MSVC __FUNCSIG__"

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: windows-2022
    timeout-minutes: 15
    steps:
      - name: Write probe source
        shell: pwsh
        run: |
          @'
          #include <cstdio>
          namespace rstudio_boost { namespace n {
          struct r { const char* s; };
          struct tag_original_exception_type;
          template <class T> __forceinline r __cdecl p() { return { __FUNCSIG__ }; }
          template <class Tag> struct error_info {
             virtual void serialize_to() const { std::printf("from virtual member: [%s]\n", p<Tag>().s); }
             virtual ~error_info() {}
          };
          } }
          int main() {
             std::printf("direct: [%s]\n", rstudio_boost::n::p<rstudio_boost::n::tag_original_exception_type>().s);
             rstudio_boost::n::error_info<rstudio_boost::n::tag_original_exception_type> ei;
             ei.serialize_to();
             return 0;
          }
          '@ | Set-Content -Path probe.cpp -Encoding ascii
          Get-Content probe.cpp

      - name: Compile and run (x86 and x64, /Od and /O2)
        shell: cmd
        run: |
          set VCVARSALL=C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat
          echo ===== x86 /Od =====
          cmd /c ""%VCVARSALL%" x86 >nul && cl /nologo /EHs /W4 /Od probe.cpp /Fe:probe1.exe && probe1.exe" || exit /b 1
          echo ===== x86 /O2 /Ob2 =====
          cmd /c ""%VCVARSALL%" x86 >nul && cl /nologo /EHs /W4 /O2 /Ob2 probe.cpp /Fe:probe2.exe && probe2.exe" || exit /b 1
          echo ===== x64 /Od =====
          cmd /c ""%VCVARSALL%" x64 >nul && cl /nologo /EHs /W4 /Od probe.cpp /Fe:probe3.exe && probe3.exe" || exit /b 1
          echo ===== x64 /O2 /Ob2 =====
          cmd /c ""%VCVARSALL%" x64 >nul && cl /nologo /EHs /W4 /O2 /Ob2 probe.cpp /Fe:probe4.exe && probe4.exe" || exit /b 1
