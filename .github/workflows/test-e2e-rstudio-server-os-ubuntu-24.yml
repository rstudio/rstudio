name: "Test: E2E Playwright RStudio (Server, Ubuntu 24, Open Source)"

on:
  workflow_dispatch:
    inputs:
      rstudio_installer_url:
        description: "URL to a Server installer (.deb on Ubuntu, .rpm on RHEL/Fedora). Leave empty to auto-resolve the latest daily for this workflow's platform. To pin a specific build, paste its full URL from dailies.rstudio.com."
        type: string
        default: ""
      r_version:
        description: "R version to install via rig (e.g. 'release', 'oldrel', 'devel', '4.4.1')."
        type: string
        default: "release"
      project:
        description: "Playwright project to run: 'desktop' or 'server'. OS and edition are auto-filtered from the host platform and PW_RSTUDIO_EDITION."
        type: string
        default: "server"
      grep:
        description: "Optional Playwright --grep pattern to run only tests whose title matches."
        type: string
        default: ""
      test_selector:
        description: "Optional test paths/files/directories to run (space-separated). Matched as substrings against test file paths. Examples: 'autocomplete.test.ts', 'tests/panes/misc/', 'autocomplete tests/panes/posit-assistant-chat/'. Leave empty to run all tests."
        type: string
        default: ""
      test_ignore:
        description: "Optional test paths/files/directories to exclude (space-separated globs). Examples: '**/code_suggestions.test.ts', '**/posit-assistant-chat/**'. Leave empty to exclude nothing."
        type: string
        default: ""
      grep_invert:
        description: "Optional Playwright --grep-invert pattern to skip tests by title."
        type: string
        default: ""
  workflow_call:
    inputs:
      rstudio_installer_url:
        type: string
        default: ""
      r_version:
        type: string
        default: "release"
      project:
        type: string
        default: "server"
      grep:
        type: string
        default: ""
      test_selector:
        type: string
        default: ""
      test_ignore:
        type: string
        default: ""
      grep_invert:
        type: string
        default: ""

permissions:
  contents: read

jobs:
  e2e-server-ubuntu:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      R_LIBS_USER: ${{ github.workspace }}/R-libs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: e2e/rstudio/package-lock.json

      - name: Install OS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb jq

      - name: Install rig
        run: |
          curl -fLs https://github.com/r-lib/rig/releases/download/latest/rig-linux-$(arch)-latest.tar.gz \
            | sudo tar xz -C /usr/local

      - name: Install R via rig
        env:
          R_VERSION: ${{ inputs.r_version }}
        run: |
          rig add "$R_VERSION"
          rig default "$R_VERSION"
          rig ls
          mkdir -p "$R_LIBS_USER"

      - name: Resolve RStudio Server .deb URL
        id: resolve
        env:
          INSTALLER_URL: ${{ inputs.rstudio_installer_url }}
        run: |
          URL="$INSTALLER_URL"
          SHA=""
          FILENAME=""
          if [ -z "$URL" ]; then
            MANIFEST=$(curl -fsSL https://dailies.rstudio.com/rstudio/latest/index.json)
            URL=$(echo "$MANIFEST" | jq -er '.products.server.platforms."noble-amd64".link')
            SHA=$(echo "$MANIFEST" | jq -er '.products.server.platforms."noble-amd64".sha256')
            FILENAME=$(echo "$MANIFEST" | jq -er '.products.server.platforms."noble-amd64".filename')
            echo "Auto-resolved latest noble-amd64 server daily:"
            echo "  URL:      $URL"
            echo "  SHA-256:  $SHA"
            echo "  Filename: $FILENAME"
          else
            FILENAME=$(basename "${URL%%\?*}")
            echo "Using override URL: $URL (SHA-256 verification skipped)"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"

      # Cache the installer keyed on its resolved filename. On the daily
      # auto-resolve path the filename embeds the version + build number, so
      # the content is immutable per name: a new daily misses and downloads, a
      # same-day rerun hits and skips the download (SHA-256 still verified
      # below). Skip caching on the override path -- a user-supplied URL has no
      # immutability guarantee and its SHA check is skipped, so a reused
      # basename could otherwise serve stale, unverified bytes.
      - name: Cache RStudio Server installer
        if: inputs.rstudio_installer_url == ''
        id: installer-cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.resolve.outputs.filename }}
          key: rstudio-server-installer-${{ steps.resolve.outputs.filename }}

      - name: Download RStudio Server .deb
        if: steps.installer-cache.outputs.cache-hit != 'true'
        env:
          DOWNLOAD_URL: ${{ steps.resolve.outputs.url }}
          DOWNLOAD_FILENAME: ${{ steps.resolve.outputs.filename }}
        run: |
          curl -fsSL --retry 3 --retry-delay 5 \
            -o "$DOWNLOAD_FILENAME" \
            "$DOWNLOAD_URL"

      - name: Verify SHA-256
        if: steps.resolve.outputs.sha256 != ''
        env:
          EXPECTED_SHA256: ${{ steps.resolve.outputs.sha256 }}
          DOWNLOAD_FILENAME: ${{ steps.resolve.outputs.filename }}
        run: |
          echo "$EXPECTED_SHA256  $DOWNLOAD_FILENAME" \
            | sha256sum -c -

      - name: Install RStudio Server
        env:
          INSTALLER_FILENAME: ${{ steps.resolve.outputs.filename }}
        run: |
          sudo apt-get install -y "./$INSTALLER_FILENAME"
          sudo systemctl stop rstudio-server
          sudo rstudio-server verify-installation

      - name: Configure verbose RStudio Server logging
        run: |
          sudo tee /etc/rstudio/logging.conf >/dev/null <<'EOF'
          [*]
          log-level=debug
          logger-type=file
          EOF

      - name: Start RStudio Server
        run: |
          sudo systemctl start rstudio-server
          sudo systemctl status rstudio-server --no-pager

      - name: Generate test credentials
        run: |
          USER="pw_$(openssl rand -hex 4)"
          PASS="$(openssl rand -base64 24)"
          echo "::add-mask::$USER"
          echo "::add-mask::$PASS"
          echo "PW_RSTUDIO_SERVER_USER=$USER" >> "$GITHUB_ENV"
          echo "PW_RSTUDIO_SERVER_PASSWORD=$PASS" >> "$GITHUB_ENV"

      - name: Create test user
        run: |
          sudo useradd -m -s /bin/bash "$PW_RSTUDIO_SERVER_USER"
          echo "$PW_RSTUDIO_SERVER_USER:$PW_RSTUDIO_SERVER_PASSWORD" | sudo chpasswd

      - name: Wait for rstudio-server
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8787/auth-sign-in >/dev/null 2>&1; then
              echo "rstudio-server is ready"
              exit 0
            fi
            sleep 2
          done
          echo "rstudio-server did not become ready"
          sudo journalctl -u rstudio-server --no-pager -n 200
          exit 1

      - name: Install e2e test dependencies
        uses: ./.github/actions/e2e-deps
        with:
          r-libs-user: ${{ env.R_LIBS_USER }}

      - name: Run Playwright tests
        working-directory: e2e/rstudio
        env:
          PW_RSTUDIO_MODE: server
          PW_RSTUDIO_EDITION: os
          PW_RSTUDIO_SERVER_URL: http://localhost:8787
          PW_PROJECT_NAME: ${{ inputs.project }}
          PW_GREP: ${{ inputs.grep }}
          PW_GREP_INVERT: ${{ inputs.grep_invert }}
          PW_TEST_SELECTOR: ${{ inputs.test_selector }}
          PW_TEST_IGNORE: ${{ inputs.test_ignore }}
        run: |
          ARGS=()
          if [ -n "$PW_TEST_SELECTOR" ]; then
            set -f
            ARGS+=($PW_TEST_SELECTOR)
            set +f
          fi
          ARGS+=(--project "$PW_PROJECT_NAME")
          if [ -n "$PW_GREP" ]; then
            ARGS+=(--grep "$PW_GREP")
          fi
          if [ -n "$PW_GREP_INVERT" ]; then
            ARGS+=(--grep-invert "$PW_GREP_INVERT")
          fi
          xvfb-run -a --server-args="-screen 0 1920x1080x24" \
            npx playwright test "${ARGS[@]}"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/rstudio/playwright-report/
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: e2e/rstudio/test-results/
          if-no-files-found: ignore

      - name: Capture rstudio-server logs and diagnostics on failure
        if: failure()
        run: |
          echo "=== /etc/rstudio/logging.conf ==="
          sudo cat /etc/rstudio/logging.conf 2>&1 || echo "(missing)"
          echo "=== layout: /var/log/rstudio ==="
          sudo find /var/log/rstudio -ls 2>&1 || echo "(missing)"
          echo "=== layout: /var/lib/rstudio-server *.log ==="
          sudo find /var/lib/rstudio-server -name '*.log' -ls 2>&1 || echo "(missing)"
          echo "=== full journalctl (last hour, all units) ==="
          sudo journalctl --since="1 hour ago" --no-pager
          sudo journalctl -u rstudio-server --no-pager > rstudio-server.log || true
          sudo cp -r /var/log/rstudio rstudio-var-log || true
          sudo chmod -R a+r rstudio-var-log || true

      - name: Upload rstudio-server logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rstudio-server-logs
          path: |
            rstudio-server.log
            rstudio-var-log/
          if-no-files-found: ignore
