name: "Test: E2E Playwright RStudio (Desktop, Ubuntu 24, Open Source, Scheduled)"

on:
  schedule:
    # Mon-Fri at 02:30 UTC -- daily run against latest source on main.
    # Offset from the Linux Server scheduled run (02:00) so the two don't
    # contend for runners at the same minute.
    - cron: '30 2 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  # The called workflow's e2e-merge job assumes the S3 report-upload role via
  # OIDC; a reusable workflow's id-token grant is capped by its caller's.
  id-token: write

jobs:
  run-desktop-ubuntu24:
    uses: ./.github/workflows/os-test-e2e-rstudio-desktop-os-ubuntu-24.yml
    secrets:
      CONNECT_API_KEY: ${{ secrets.CONNECT_API_KEY }}
      AWS_E2E_REPORTS_ROLE_ARN: ${{ secrets.AWS_E2E_REPORTS_ROLE_ARN }}
      AWS_SCCACHE_ROLE_ARN: ${{ secrets.AWS_SCCACHE_ROLE_ARN }}
    with:
      project: desktop
      r_version: "release"
