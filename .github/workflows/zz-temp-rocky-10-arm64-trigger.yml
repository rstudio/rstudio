name: "TEMP: trigger Rocky 10 arm64 engine"

# TEMPORARY. Shakes out the new Rocky 10 arm64 engine on its feature branch,
# because workflow_dispatch only works for workflows already on the default
# branch. This caller fires on every push to the feature branch and runs the
# engine via workflow_call. The download path (build_from_source: false) is
# already validated green, so this now sets build_from_source: true to exercise
# the Rocky container build job (install-dependencies-yum, make-electron-package
# RPM) before merge. DELETE this file before merging to main.

on:
  push:
    branches:
      - test/ron/e2e-rocky-10-arm64-engine-workflow

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  rocky10-arm64:
    uses: ./.github/workflows/os-test-e2e-rstudio-desktop-os-rocky-10-arm64.yml
    with:
      build_from_source: true
    secrets: inherit
