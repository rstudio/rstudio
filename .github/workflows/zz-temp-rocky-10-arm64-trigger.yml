name: "TEMP: trigger Rocky 10 arm64 engine"

# TEMPORARY. Shakes out the new Rocky 10 arm64 engine on its feature branch,
# because workflow_dispatch only works for workflows already on the default
# branch. This caller fires on every push to the feature branch and runs the
# engine via workflow_call. Both paths are now validated green (download and
# build-from-source), so this uses build_from_source: false (the fast download
# path, matching how the real scheduled rotation invokes the engine) to validate
# the merged and reconciled state. DELETE this file before merging to main.

on:
  push:
    branches:
      - test/ron/e2e-rocky-10-arm64-engine-workflow

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  rocky10-arm64:
    uses: ./.github/workflows/os-test-e2e-rstudio-desktop-os-rocky-10-arm64.yml
    with:
      build_from_source: false
    secrets: inherit
