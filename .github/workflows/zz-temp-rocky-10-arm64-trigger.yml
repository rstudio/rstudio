name: "TEMP: trigger Rocky 10 arm64 engine"

# TEMPORARY. Shakes out the new Rocky 10 arm64 engine on its feature branch,
# because workflow_dispatch only works for workflows already on the default
# branch. This caller fires on every push to the feature branch and runs the
# engine via workflow_call. First validation uses build_from_source: false so it
# takes the daily-download path and exercises the new Cage/Xwayland/rig/PPM e2e
# job quickly (the source-build path is already proven by the RHEL/Fedora
# siblings). DELETE this file before merging to main.

on:
  push:
    branches:
      - test/ron/e2e-rocky-10-arm64-engine-workflow

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  rocky10-arm64:
    uses: ./.github/workflows/os-test-e2e-rstudio-desktop-os-rocky-10-arm64.yml
    with:
      build_from_source: false
    secrets: inherit
