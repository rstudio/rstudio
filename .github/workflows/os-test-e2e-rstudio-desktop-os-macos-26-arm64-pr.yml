name: "Test: E2E Playwright RStudio (Desktop, macOS 26 ARM64, Open Source, PR-triggered)"

on:
  pull_request:
    paths:
      - "src/**"
      - "dependencies/**"
      - "e2e/rstudio/**"
      - ".github/actions/e2e-deps/**"
      - ".github/workflows/os-test-e2e-rstudio-desktop-os-macos-26-arm64-pr.yml"
      - ".github/workflows/os-test-e2e-rstudio-desktop-os-macos-26-arm64.yml"

concurrency:
  group: pw-pr-macos-26-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  run-macos-26:
    uses: ./.github/workflows/os-test-e2e-rstudio-desktop-os-macos-26-arm64.yml
    secrets:
      # Fork PRs intentionally don't receive this secret; the reusable workflow
      # then skips the 1Password step and the reporter / @ai-test creds are
      # absent. Reporter uploads warn (never fail the run); @ai tests skip
      # with reason. Same shape as before, just sourced via 1Password now.
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
    with:
      project: desktop
      r_version: "4.5.3"
      # Skip @ai-tagged tests on PRs for now.
      grep_invert: "@ai"
      post_pr_comment: true
