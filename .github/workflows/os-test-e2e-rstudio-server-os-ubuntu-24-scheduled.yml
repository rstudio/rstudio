name: "Test: E2E Playwright RStudio (Server, Ubuntu 24, Open Source, Scheduled)"

on:
  schedule:
    # Mon-Fri at 02:00 UTC -- daily run against latest source on main.
    - cron: '0 2 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  run-server-ubuntu24:
    uses: ./.github/workflows/os-test-e2e-rstudio-server-os-ubuntu-24.yml
    secrets:
      CONNECT_API_KEY: ${{ secrets.CONNECT_API_KEY }}
    with:
      project: server
      r_version: "release"
      grep_invert: "@ai"
