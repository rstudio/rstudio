name: "Test: E2E Playwright RStudio (Desktop, Windows Server 2025 x64, Open Source, Scheduled)"

on:
  schedule:
    # Mon-Fri at 03:00 UTC -- daily full-suite run against latest daily build.
    - cron: '0 3 * * 1-5'
  workflow_dispatch:

concurrency:
  group: pw-scheduled-windows-2025
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run-windows-2025:
    uses: ./.github/workflows/os-test-e2e-rstudio-desktop-os-windows-server-2025.yml
    with:
      project: desktop
      r_version: "release"
      grep_invert: "@ai"
