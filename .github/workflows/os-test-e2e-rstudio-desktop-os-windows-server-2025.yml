name: "Test: E2E Playwright RStudio (Desktop, Windows Server 2025 x64, Open Source)"

on:
  workflow_dispatch:
    inputs:
      build_from_source:
        description: "Build RStudio Desktop from this branch's source. When false, downloads the latest daily installer."
        type: boolean
        default: true
      rstudio_installer_url:
        description: "URL to a Desktop installer (.exe). Only used when build_from_source is false. Leave empty to auto-resolve the latest daily."
        type: string
        default: ""
      r_version:
        description: "R version to install via rig (e.g. 'release', 'oldrel', 'devel', '4.4.1')."
        type: string
        default: "release"
      project:
        description: "Playwright project to run: 'desktop' or 'server'. OS and edition are auto-filtered from the host platform and PW_RSTUDIO_EDITION."
        type: string
        default: "desktop"
      grep:
        description: "Optional Playwright --grep pattern to run only tests whose title matches."
        type: string
        default: ""
      test_selector:
        description: "Optional test paths/files/directories to run (space-separated). Matched as substrings against test file paths. Examples: 'autocomplete.test.ts', 'tests/panes/misc/', 'autocomplete tests/panes/posit-assistant-chat/'. Leave empty to run all tests."
        type: string
        default: ""
      test_ignore:
        description: "Optional test paths/files/directories to exclude (space-separated globs). Examples: '**/code_suggestions.test.ts', '**/posit-assistant-chat/**'. Leave empty to exclude nothing."
        type: string
        default: ""
      grep_invert:
        description: "Optional Playwright --grep-invert pattern to skip tests by title."
        type: string
        default: ""
      rstudio_extra_args:
        description: "Optional extra args passed to RStudio Desktop on launch (space-separated). Maps to PW_RSTUDIO_EXTRA_ARGS."
        type: string
        default: ""
      build_only:
        description: "Run only the build job (to seed the rstudio-tools / sccache caches) and skip the e2e job. Only meaningful when build_from_source is true."
        type: boolean
        default: false
      post_pr_comment:
        description: "Post test results as a sticky comment on the PR. Pass true only from PR-triggered callers."
        type: boolean
        default: false
  workflow_call:
    inputs:
      build_from_source:
        type: boolean
        # Callers (PR dispatcher, seed, scheduled) always pass this explicitly.
        # false here is a safe fallback — if a caller omits it, the workflow
        # downloads a daily rather than unexpectedly kicking off a 90-min build.
        # macOS defaults to true in workflow_call; the asymmetry is intentional.
        default: false
      rstudio_installer_url:
        type: string
        default: ""
      r_version:
        type: string
        default: "release"
      project:
        type: string
        default: "desktop"
      grep:
        type: string
        default: ""
      test_selector:
        type: string
        default: ""
      test_ignore:
        type: string
        default: ""
      grep_invert:
        type: string
        default: ""
      rstudio_extra_args:
        type: string
        default: ""
      build_only:
        type: boolean
        default: false
      post_pr_comment:
        type: boolean
        default: false
    secrets:
      CONNECT_API_KEY:
        description: "Posit Connect API key for the E2E Test Insights reporter"
        required: false

permissions:
  contents: read
  pull-requests: write  # required in workflow_call context; job-level alone is capped by top-level

jobs:
  # Builds RStudio Desktop from this PR's source on the same runner image as
  # the e2e job below, then uploads a zipped Electron app directory as an
  # artifact. Only runs when build_from_source is true; skipped on daily
  # download runs.
  build:
    if: inputs.build_from_source == true && inputs.rstudio_installer_url == ''
    runs-on: windows-2025
    timeout-minutes: 180
    defaults:
      run:
        shell: pwsh
    env:
      R_LIBS_USER: ${{ github.workspace }}\R-libs
      SCCACHE_ENABLED: '1'
      SCCACHE_GHA_ENABLED: 'true'
      NPM_CONFIG_LOGLEVEL: error
      NPM_CONFIG_AUDIT: 'false'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Enable long paths before any build step: the Electron output tree and
      # node_modules can exceed Windows' 260-char MAX_PATH limit silently.
      - name: Enable Windows long paths
        run: |
          $ErrorActionPreference = 'Stop'
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1
          git config --global core.longpaths true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: src/node/desktop/package-lock.json

      # Windows runners have ~14GB free. RStudio's C++ build + MSVC + all
      # downloaded deps can push that limit. Remove pre-installed components
      # we don't need to free ~6-8GB before the build starts.
      - name: Free disk space
        run: |
          $before = Get-PSDrive -Name C
          Write-Host "Disk space before cleanup: $([math]::Round($before.Free / 1GB, 1)) GB free"
          $dirs = @(
            'C:\Program Files\dotnet',
            'C:\Program Files (x86)\Android',
            'C:\Program Files\Microsoft SQL Server',
            'C:\Program Files\Azure Cosmos DB Emulator',
            'C:\Program Files (x86)\Microsoft SDKs\Azure',
            'C:\Android'
          )
          foreach ($d in $dirs) {
            if (Test-Path $d) { Remove-Item -Recurse -Force $d -ErrorAction SilentlyContinue }
          }
          $after  = Get-PSDrive -Name C
          $freed  = [math]::Round(($after.Free - $before.Free) / 1GB, 1)
          $freeGB = [math]::Round($after.Free / 1GB, 1)
          Write-Host "Disk space after cleanup:  $freeGB GB free (freed ~$freed GB)"

      # Downloaded build deps (Boost, SOCI, GWT, Node, pandoc, quarto, etc.)
      # land in dependencies/common and dependencies/windows within the
      # workspace when c:\rstudio-tools\dependencies doesn't exist. Keyed on
      # the install scripts so a version bump forces a fresh download.
      # Restore-only; Save rstudio-tools cache runs after the build with
      # if: always() so deps are cached even when compilation fails.
      - name: Restore rstudio-tools deps
        id: tools-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            dependencies/common
            dependencies/windows
          key: rstudio-tools-win64-${{ hashFiles('dependencies/common/install-*', 'dependencies/windows/install-dependencies.cmd', 'dependencies/tools/rstudio-tools.cmd') }}
          restore-keys: |
            rstudio-tools-win64-

      # Cache compiled GWT output (src/gwt/www, bin, extras). GWT compilation
      # is the single most expensive step in the build (~15-30 min). When the
      # GWT sources haven't changed since the last seeder run on main, the cache
      # restores the compiled JS/CSS into src/gwt/ and the build step skips
      # recompilation via the nogwt flag below.
      # Restore-only; Save GWT output runs after the build with if: always().
      - name: Restore GWT output
        id: gwt-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            src/gwt/www
            src/gwt/bin
            src/gwt/extras
          key: rstudio-gwt-win64-${{ hashFiles('src/gwt/src/**', 'src/gwt/acesupport/**', 'src/gwt/lib/**', 'src/gwt/build.xml', 'src/gwt/conf/**') }}
          restore-keys: |
            rstudio-gwt-win64-

      - name: Install build tools
        run: choco install ant nsis --yes --no-progress

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696  # v0.0.10

      # Pre-start the sccache server. Ninja runs parallel cl.exe compiles
      # through `sccache.exe cl.exe ...`; on Windows each sccache.exe
      # invocation tries to start a TCP server on 127.0.0.1:4226 if no
      # server is running. With N parallel compiles, N processes race to
      # bind that port -- one wins, the rest exit with os error 10048
      # ("Only one usage of each socket address... is normally permitted"),
      # which ninja treats as a compile failure and aborts the whole
      # build. Starting the server explicitly here means all subsequent
      # sccache.exe invocations connect to it instead of racing.
      # Set SCCACHE_IDLE_TIMEOUT=0 so the server stays alive for the
      # whole build (default is 600s and the build phase is longer).
      - name: Start sccache server
        shell: cmd
        env:
          SCCACHE_IDLE_TIMEOUT: '0'
        run: sccache --start-server

      - name: Install rig
        run: |
          $ErrorActionPreference = 'Stop'
          $maxAttempts = 3
          for ($i = 1; $i -le $maxAttempts; $i++) {
            winget install --id Posit.rig --accept-source-agreements --accept-package-agreements --disable-interactivity
            if ($LASTEXITCODE -eq 0) { break }
            if ($i -lt $maxAttempts) {
              Write-Host "winget attempt $i failed (exit $LASTEXITCODE), retrying in 15s..."
              Start-Sleep -Seconds 15
            } else {
              Write-Error "winget install Posit.rig failed after $maxAttempts attempts"
              exit 1
            }
          }
          Add-Content -Path $env:GITHUB_PATH -Value 'C:\Program Files\rig'

      - name: Install R via rig
        env:
          R_VERSION: ${{ inputs.r_version }}
        run: |
          $ErrorActionPreference = 'Stop'
          rig add $env:R_VERSION
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          rig default $env:R_VERSION
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          rig ls
          New-Item -ItemType Directory -Force -Path $env:R_LIBS_USER | Out-Null

      # make-package.bat passes -DLIBR_HOME=C:\R\R-3.6.3 to CMake (hardcoded).
      # Create a directory junction at that path pointing to the rig-installed
      # R so CMake can find R headers and R.dll regardless of actual version.
      - name: Create R junction for CMake
        run: |
          $ErrorActionPreference = 'Stop'
          $rHome = (Rscript --vanilla -e "cat(R.home())" 2>$null).Trim()
          Write-Host "R home: $rHome"
          New-Item -ItemType Directory -Force -Path 'C:\R' | Out-Null
          if (Test-Path 'C:\R\R-3.6.3') { [System.IO.Directory]::Delete('C:\R\R-3.6.3') }
          New-Item -ItemType Junction -Path 'C:\R\R-3.6.3' -Target $rHome | Out-Null
          Write-Host "Junction created: C:\R\R-3.6.3 -> $rHome"
          if (-not (Test-Path 'C:\R\R-3.6.3\bin\Rscript.exe')) {
            Write-Error "Rscript.exe not found via junction; check rig install path"
            exit 1
          }

      # install-dependencies.cmd (via tools.R) checks for MSVC 2022 at a set of
      # hardcoded paths: BuildTools, Community, and their x86 variants.  GitHub
      # runners have Visual Studio 2022 Enterprise, which is not in that list.
      # Use vswhere.exe to find the actual installation, then:
      #   1. Add VC\Auxiliary\Build to GITHUB_PATH so vcvarsall.bat is on PATH
      #      for make-package.bat (which calls it by name).
      #   2. Create a junction at the BuildTools path so tools.R's file.exists
      #      check finds MSVC and proceeds to compile SOCI.
      - name: Set up MSVC environment
        run: |
          $ErrorActionPreference = 'Stop'
          $vsPath = & 'C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe' `
            -latest -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath
          if ([string]::IsNullOrEmpty($vsPath)) {
            Write-Error "vswhere could not find a Visual Studio installation with VC++ tools"
            exit 1
          }
          Write-Host "Visual Studio installation: $vsPath"
          # 1. PATH for vcvarsall.bat
          $vcBuildPath = Join-Path $vsPath 'VC\Auxiliary\Build'
          Add-Content -Path $env:GITHUB_PATH -Value $vcBuildPath
          Write-Host "Added to PATH: $vcBuildPath"
          # 2. Junction so tools.R's hardcoded BuildTools check passes
          $junctionTarget = $vsPath
          $junctionPath   = 'C:\Program Files\Microsoft Visual Studio\2022\BuildTools'
          if (-not (Test-Path $junctionPath)) {
            New-Item -ItemType Junction -Path $junctionPath -Target $junctionTarget | Out-Null
            Write-Host "Junction created: $junctionPath -> $junctionTarget"
          } else {
            Write-Host "Junction already exists: $junctionPath"
          }

      # install-soci.R defaults its CMake generator to "Visual Studio 17 2022",
      # which doesn't exist on windows-2025 once the image moves to VS 2026
      # (CMake reports `could not find any instance of Visual Studio`). Pass the
      # VS 2026 generator name explicitly so SOCI can configure and build.
      # MSVC 14.x is binary-compatible, so the resulting libs link cleanly
      # against the msvc143 Boost prebuilts that CMakeLists.txt falls back to.
      - name: Install build dependencies
        id: install-deps
        working-directory: dependencies/windows
        shell: cmd
        env:
          CMAKE_GENERATOR: Visual Studio 18 2026
        run: install-dependencies.cmd

      # GWT's build.xml looks for yarn at ${node.dir}/node_modules/yarn/bin/yarn.cmd
      # via set-if-exists (node.dir = the bundled node downloaded by install-deps).
      # Installing directly into the bundled node dir via npm --prefix pollutes
      # it with an incompatible node_modules/npm tree (system npm vs bundled npm),
      # which breaks the Electron packaging step later. Instead: install yarn into
      # a throwaway temp dir, then copy only the yarn package into the bundled
      # node dir so build.xml's check is satisfied without touching bundled npm.
      - name: Install yarn in bundled node directory
        run: |
          $ErrorActionPreference = 'Stop'
          $nodeVersion = (Select-String -Path 'dependencies\tools\rstudio-tools.cmd' `
            -Pattern 'set RSTUDIO_NODE_VERSION=(.+)').Matches[0].Groups[1].Value.Trim()
          $nodeDir = "$env:GITHUB_WORKSPACE\dependencies\common\node\$nodeVersion"
          if (-not (Test-Path $nodeDir)) {
            Write-Error "Bundled node directory not found: $nodeDir"
            exit 1
          }
          $tempDir = "$env:RUNNER_TEMP\yarn-install"
          Write-Host "Installing yarn to temp dir: $tempDir"
          npm install --prefix "$tempDir" yarn
          $yarnSrc = "$tempDir\node_modules\yarn"
          if (-not (Test-Path "$yarnSrc\bin\yarn.cmd")) {
            Write-Error "yarn.cmd not found in temp install at $yarnSrc"
            exit 1
          }
          $yarnDest = "$nodeDir\node_modules\yarn"
          if (Test-Path $yarnDest) { Remove-Item -Recurse -Force $yarnDest }
          Copy-Item -Recurse $yarnSrc $yarnDest
          Write-Host "yarn installed: $yarnDest\bin\yarn.cmd"

      # The Electron packaging step runs `npm ci && electron-forge package`
      # inside src/node/desktop-build-AMD64. Because src/node/desktop ships a
      # binding.gyp, npm auto-runs `node-gyp rebuild` as the install lifecycle
      # and uses npm's bundled node-gyp (v11.5.0 in node 22). v11 only knows
      # VS 2017-2022 and aborts with "Could not find any Visual Studio
      # installation to use" on the VS 2026 runner. node-gyp v12+ supports
      # VS 2026.
      #
      # npm_config_node_gyp would normally redirect this, but npm pre-injects
      # its bundled node-gyp directory into PATH for lifecycle scripts; the
      # env var is documented as "the command to run for npm rebuild when
      # node-gyp isn't in the path", so the bundled v11 wins. The surgical
      # fix is to physically replace node-gyp inside the bundled npm tree --
      # same pattern this workflow already uses for yarn above.
      - name: Replace bundled node-gyp with v12 for VS 2026 support
        run: |
          $ErrorActionPreference = 'Stop'
          $nodeVersion = (Select-String -Path 'dependencies\tools\rstudio-tools.cmd' `
            -Pattern 'set RSTUDIO_NODE_VERSION=(.+)').Matches[0].Groups[1].Value.Trim()
          $bundledNodeDir = "$env:GITHUB_WORKSPACE\dependencies\common\node\$nodeVersion"
          $bundledGypDir  = "$bundledNodeDir\node_modules\npm\node_modules\node-gyp"
          if (-not (Test-Path $bundledGypDir)) {
            Write-Error "Bundled node-gyp directory not found: $bundledGypDir"
            exit 1
          }
          # Install latest node-gyp v12 into a throwaway dir, then copy its
          # contents over the bundled one. --install-strategy=nested disables
          # npm's default hoisting so node-gyp's transitive deps (undici,
          # semver, tar, ...) land inside node-gyp/node_modules/. Without
          # nested install, deps hoist to the prefix's top-level node_modules,
          # the copy leaves them behind, and node-gyp v12 then dies at runtime
          # with "Cannot find module 'undici'" (its new HTTP client dep).
          # Use the bundled npm so the install runs under the same node
          # version that will spawn node-gyp during the rebuild lifecycle.
          $gypInstallDir = "$env:RUNNER_TEMP\node-gyp-v12"
          if (Test-Path $gypInstallDir) { Remove-Item -Recurse -Force $gypInstallDir }
          New-Item -ItemType Directory -Force -Path $gypInstallDir | Out-Null
          & "$bundledNodeDir\npm.cmd" install --install-strategy=nested --prefix $gypInstallDir node-gyp@^12
          if ($LASTEXITCODE -ne 0) { Write-Error "node-gyp v12 install failed"; exit $LASTEXITCODE }
          $newGypDir = "$gypInstallDir\node_modules\node-gyp"
          if (-not (Test-Path "$newGypDir\bin\node-gyp.js")) {
            Write-Error "node-gyp v12 not installed at $newGypDir"
            exit 1
          }
          if (-not (Test-Path "$newGypDir\node_modules\undici")) {
            Write-Error "Expected nested undici at $newGypDir\node_modules\undici but not found -- nested install did not behave as expected"
            exit 1
          }
          $bundledVersion = (Get-Content "$bundledGypDir\package.json" | ConvertFrom-Json).version
          $newVersion     = (Get-Content "$newGypDir\package.json"     | ConvertFrom-Json).version
          Write-Host "Replacing bundled node-gyp $bundledVersion with $newVersion (nested deps included)"
          Remove-Item -Recurse -Force $bundledGypDir
          Copy-Item -Recurse $newGypDir $bundledGypDir
          # Sanity check: version is 12.x and undici is reachable where
          # node-gyp's download.js does `require('undici')`.
          $finalVersion = (Get-Content "$bundledGypDir\package.json" | ConvertFrom-Json).version
          if ($finalVersion -notlike '12.*') {
            Write-Error "Replacement failed: bundled node-gyp is still $finalVersion"
            exit 1
          }
          if (-not (Test-Path "$bundledGypDir\node_modules\undici")) {
            Write-Error "undici missing from $bundledGypDir\node_modules -- nested deps were lost in copy"
            exit 1
          }
          Write-Host "Bundled node-gyp at $bundledGypDir is now version $finalVersion with nested deps"

      # Use nogwt when the GWT cache was restored -- skips the Ant compilation
      # step and reuses the compiled JS/CSS already in src/gwt/www. On a cache
      # miss (first run, or after GWT source changes) a full GWT build runs and
      # the result is saved to the cache for the next PR.
      # nozip: skip the cpack ZIP target -- we use the NSIS installer instead.
      # (Removing 'quick' means cpack -G NSIS runs and produces the .exe, which
      # includes rsession.exe, vcredist DLLs, GWT output, and all cmake-installed
      # resources -- unlike a raw electron-packager zip which is missing them.)
      - name: Build RStudio Desktop (x64)
        id: build
        working-directory: package/win32
        shell: cmd
        env:
          RSTUDIO_VERSION_MAJOR: '99'
          RSTUDIO_VERSION_MINOR: '9'
          RSTUDIO_VERSION_PATCH: '9'
          RSTUDIO_VERSION_SUFFIX: '-pr+${{ github.run_number }}'
          GWT_CACHE_HIT: ${{ steps.gwt-cache.outputs.cache-hit }}
          # Diagnostic: route sccache's own logs to a file. The build is still
          # reporting `Compile requests: 0` even though the LAUNCHER variable
          # is wired correctly in build.ninja's per-target settings and the
          # rules.ninja `command =` line references `${LAUNCHER}`. That means
          # ninja either never executes sccache.exe, or sccache.exe runs and
          # silently bails out before incrementing any stats counter. Verbose
          # logs distinguish those two cases.
          SCCACHE_LOG: info
          SCCACHE_ERROR_LOG: ${{ github.workspace }}\sccache-error.log
        run: |
          if "%GWT_CACHE_HIT%"=="true" (
            echo GWT cache hit -- using nogwt flag
            make-package.bat nozip nogwt
          ) else (
            echo GWT cache miss -- compiling GWT from scratch
            make-package.bat nozip
          )

      # Upload sccache's own log so we can see, per compile, whether sccache
      # was invoked, which compiler it identified, and whether it fell back
      # to direct compilation. Always runs.
      - name: Upload sccache error log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sccache-error-log-win
          path: ${{ github.workspace }}\sccache-error.log
          if-no-files-found: ignore
          retention-days: 3

      # Diagnostic: confirm sccache is actually wired into the CXX compile
      # rules. CMake's Ninja generator factors rule templates into
      # `CMakeFiles\rules.ninja` (included from build.ninja); per-target
      # variables like LAUNCHER live in build.ninja next to each `build`
      # statement, and the rule's `command =` line in rules.ninja references
      # `$LAUNCHER` to apply it. If the rule template doesn't actually use
      # `$LAUNCHER`, sccache is wired in vain and `sccache --show-stats`
      # reports 0 compile requests despite the cache variable being set.
      - name: Verify sccache is wired into build.ninja
        if: always()
        shell: pwsh
        run: |
          $build = 'package/win32/build/build.ninja'
          $rules = 'package/win32/build/CMakeFiles/rules.ninja'
          if (-not (Test-Path $build)) {
            Write-Host "No build.ninja at $build -- configure step did not produce one."
            exit 0
          }
          Write-Host "=== build.ninja size: $((Get-Item $build).Length) bytes ==="
          Write-Host "=== rules.ninja size: $(if (Test-Path $rules) { (Get-Item $rules).Length } else { 'MISSING' }) bytes ==="
          Write-Host ""
          Write-Host "=== LAUNCHER per-target settings in build.ninja (count + sample) ==="
          $launchers = Select-String -Path $build -Pattern 'LAUNCHER\s*=.*sccache'
          Write-Host "  Found $($launchers.Count) LAUNCHER lines pointing at sccache"
          $launchers | Select-Object -First 2 | ForEach-Object { Write-Host "  $($_.Line.Trim())" }
          Write-Host ""
          if (Test-Path $rules) {
            Write-Host "=== Rule definitions in rules.ninja that mention CXX_COMPILER ==="
            Select-String -Path $rules -Pattern '^rule CXX_COMPILER' | ForEach-Object { Write-Host "  $($_.Line)" }
            Write-Host ""
            Write-Host "=== First CXX rule's `command =` line (does it reference \$LAUNCHER?) ==="
            $lines = Get-Content $rules
            for ($i = 0; $i -lt $lines.Count; $i++) {
              if ($lines[$i] -match '^rule CXX_COMPILER') {
                $name = $lines[$i]
                Write-Host "  --> $name"
                for ($j = $i+1; $j -lt $lines.Count -and $j -lt $i+8; $j++) {
                  if ($lines[$j] -match '^rule ') { break }
                  Write-Host "  $($lines[$j])"
                }
                break
              }
            }
            Write-Host ""
            Write-Host "=== Diagnostic summary ==="
            $ruleRefsLauncher = (Select-String -Path $rules -Pattern '\$LAUNCHER' -Quiet)
            $ruleHasSccacheLiteral = (Select-String -Path $rules -Pattern 'sccache' -Quiet)
            if ($ruleRefsLauncher) {
              Write-Host "OK: rules.ninja references \$LAUNCHER -- the per-target sccache path WILL be invoked."
            } elseif ($ruleHasSccacheLiteral) {
              Write-Host "OK: rules.ninja references sccache literally."
            } else {
              Write-Host "PROBLEM: rules.ninja CXX compile rules do NOT reference \$LAUNCHER or sccache. Per-target LAUNCHER lines in build.ninja are dead. sccache will never be called."
            }
          }

      # Upload both ninja files so we can inspect compile-rule wiring offline.
      - name: Upload ninja files for offline diagnosis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-ninja-win
          path: |
            package/win32/build/build.ninja
            package/win32/build/CMakeFiles/rules.ninja
          if-no-files-found: ignore
          retention-days: 3

      - name: Save rstudio-tools cache
        if: steps.install-deps.conclusion == 'success'
        uses: actions/cache/save@v4
        with:
          path: |
            dependencies/common
            dependencies/windows
          key: ${{ steps.tools-cache.outputs.cache-primary-key }}

      - name: Save GWT output
        if: steps.build.conclusion == 'success'
        uses: actions/cache/save@v4
        with:
          path: |
            src/gwt/www
            src/gwt/bin
            src/gwt/extras
          key: ${{ steps.gwt-cache.outputs.cache-primary-key }}

      # The NSIS installer is created by cpack -G NSIS (run by make-package.bat
      # without the 'quick' flag) and placed in package\win32\build\. It
      # includes rsession.exe, GWT output, vcredist DLLs, and all cmake-installed
      # resources -- a complete, properly-assembled RStudio installation.
      # The e2e job runs it with /S (silent) so RStudio lands at the standard
      # C:\Program Files\RStudio\ path identical to end-user installs.
      # Skipped in build_only (seed) runs -- no e2e job consumes the artifact.
      - name: Find and stage NSIS installer
        if: inputs.build_only != true
        run: |
          $ErrorActionPreference = 'Stop'
          $installer = Get-ChildItem -Path 'package\win32\build' -Filter 'RStudio-*.exe' |
                       Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) {
            Write-Error "No NSIS installer found in package\win32\build\; check that make-package.bat ran without the 'quick' flag"
            exit 1
          }
          $sizeMB = [math]::Round($installer.Length / 1MB, 1)
          Write-Host "Found installer: $($installer.FullName) ($sizeMB MB)"
          Copy-Item $installer.FullName "$env:GITHUB_WORKSPACE\RStudio-installer.exe"
          Write-Host "Staged as: $env:GITHUB_WORKSPACE\RStudio-installer.exe"

      - name: Upload RStudio Desktop artifact
        if: inputs.build_only != true
        uses: actions/upload-artifact@v4
        with:
          name: rstudio-app-windows-x64
          path: RStudio-installer.exe
          retention-days: 7

  e2e-desktop-windows:
    needs: build
    # build is skipped when build_from_source is false; allow this job to run
    # in that case too. build_only seeds caches without running e2e, so skip here.
    if: |
      always() &&
      inputs.build_only != true &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    runs-on: windows-2025
    timeout-minutes: 120
    defaults:
      run:
        shell: pwsh
    env:
      R_LIBS_USER: ${{ github.workspace }}\R-libs
      PW_SANDBOX_ROOT: ${{ github.workspace }}\pw-sandbox
      PW_SANDBOX_ROOT_CREATE: '1'
      # Override the default platform-specific R library template so the sandbox
      # uses the same path that the e2e-deps action installs and caches. Without
      # this the sandbox writes to %LOCALAPPDATA%\rstudio-playwright\r-libs\...
      # (a different path) causing packages to be re-downloaded on every run.
      PW_RSTUDIO_R_LIBS_USER: ${{ github.workspace }}\R-libs

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Enable Windows long paths
        run: |
          $ErrorActionPreference = 'Stop'
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1
          git config --global core.longpaths true
          # Export LOCALAPPDATA to GITHUB_ENV so the crash-dump upload step can
          # reference it via ${{ env.LOCALAPPDATA }}.  GitHub Actions' env context
          # does not expose OS environment variables directly.
          "LOCALAPPDATA=$env:LOCALAPPDATA" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: e2e/rstudio/package-lock.json

      - name: Install rig
        run: |
          $ErrorActionPreference = 'Stop'
          $maxAttempts = 3
          for ($i = 1; $i -le $maxAttempts; $i++) {
            winget install --id Posit.rig --accept-source-agreements --accept-package-agreements --disable-interactivity
            if ($LASTEXITCODE -eq 0) { break }
            if ($i -lt $maxAttempts) {
              Write-Host "winget attempt $i failed (exit $LASTEXITCODE), retrying in 15s..."
              Start-Sleep -Seconds 15
            } else {
              Write-Error "winget install Posit.rig failed after $maxAttempts attempts"
              exit 1
            }
          }
          Add-Content -Path $env:GITHUB_PATH -Value 'C:\Program Files\rig'

      - name: Install R via rig
        env:
          R_VERSION: ${{ inputs.r_version }}
        run: |
          $ErrorActionPreference = 'Stop'
          rig add $env:R_VERSION
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          rig default $env:R_VERSION
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          rig ls
          # Prepend the rig-installed R to PATH so it wins over any R version
          # pre-installed on the runner image (e.g. R 4.6 shipped on windows-2025).
          # rig installs to C:\Program Files\R\R-{version}\bin\x64 on Windows.
          $rHome = (Rscript --vanilla -e "cat(R.home())" 2>$null).Trim()
          $rBin = "$rHome\bin\x64"
          Write-Host "Prepending R bin to PATH: $rBin"
          "$rBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          New-Item -ItemType Directory -Force -Path $env:R_LIBS_USER | Out-Null

      # Build-from-source path: download and install the NSIS installer produced
      # by the build job above. Runs the same /S silent install as the
      # daily-download path so RStudio lands at C:\Program Files\RStudio\.
      - name: Download RStudio Desktop artifact
        if: inputs.build_from_source == true && inputs.rstudio_installer_url == ''
        uses: actions/download-artifact@v4
        with:
          name: rstudio-app-windows-x64
          path: ${{ github.workspace }}

      - name: Install RStudio from artifact
        if: inputs.build_from_source == true && inputs.rstudio_installer_url == ''
        run: |
          $ErrorActionPreference = 'Stop'
          $installer = "$env:GITHUB_WORKSPACE\RStudio-installer.exe"
          if (-not (Test-Path $installer)) {
            Write-Error "RStudio installer not found at $installer"
            exit 1
          }
          Write-Host "Installing from: $installer"
          $p = Start-Process -FilePath $installer -ArgumentList '/S' -Wait -PassThru
          if ($p.ExitCode -ne 0) { Write-Error "RStudio installer exited $($p.ExitCode)"; exit 1 }
          $exe = 'C:\Program Files\RStudio\rstudio.exe'
          if (-not (Test-Path $exe)) {
            Write-Error "rstudio.exe not found at $exe after install"
            exit 1
          }
          Get-Item $exe | Format-List FullName, Length, LastWriteTime

      # Daily-download path: resolve and install the latest (or specified) .exe.
      # Also runs when build_from_source is true but rstudio_installer_url is set
      # (mirrors macOS: the URL overrides the artifact path).
      - name: Resolve RStudio .exe URL
        if: inputs.build_from_source == false || inputs.rstudio_installer_url != ''
        id: resolve
        env:
          INSTALLER_URL: ${{ inputs.rstudio_installer_url }}
        run: |
          $ErrorActionPreference = 'Stop'
          $url = $env:INSTALLER_URL
          $sha = ''
          $filename = ''
          if ([string]::IsNullOrEmpty($url)) {
            $manifest = Invoke-RestMethod -Uri 'https://dailies.rstudio.com/rstudio/latest/index.json' `
              -MaximumRetryCount 3 -RetryIntervalSec 5
            $win = $manifest.products.electron.platforms.windows
            $url = $win.link
            $sha = $win.sha256
            $filename = $win.filename
            if ([string]::IsNullOrEmpty($url) -or [string]::IsNullOrEmpty($filename) -or [string]::IsNullOrEmpty($sha)) {
              Write-Error "Daily manifest is missing expected fields (url='$url', filename='$filename', sha256='$sha'). The schema at https://dailies.rstudio.com/rstudio/latest/index.json may have changed."
              exit 1
            }
            Write-Host "Auto-resolved latest windows daily:"
            Write-Host "  URL:      $url"
            Write-Host "  SHA-256:  $sha"
            Write-Host "  Filename: $filename"
          } else {
            $filename = Split-Path -Leaf $url
            if ([string]::IsNullOrEmpty($filename)) {
              Write-Error "Could not derive filename from rstudio_installer_url='$url'. Provide a URL whose path ends with a filename (e.g. .../RStudio-2024.12.0-467.exe)."
              exit 1
            }
            Write-Host "Using override URL: $url (SHA-256 verification skipped)"
          }
          "url=$url"           | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sha256=$sha"        | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "filename=$filename" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Cache RStudio installer
        if: inputs.build_from_source == false && inputs.rstudio_installer_url == ''
        id: installer-cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.resolve.outputs.filename }}
          key: rstudio-installer-${{ steps.resolve.outputs.filename }}

      - name: Download RStudio .exe
        if: (inputs.build_from_source == false || inputs.rstudio_installer_url != '') && steps.installer-cache.outputs.cache-hit != 'true'
        env:
          DOWNLOAD_URL: ${{ steps.resolve.outputs.url }}
          DOWNLOAD_FILENAME: ${{ steps.resolve.outputs.filename }}
        run: |
          $ErrorActionPreference = 'Stop'
          Invoke-WebRequest `
            -Uri $env:DOWNLOAD_URL `
            -OutFile $env:DOWNLOAD_FILENAME `
            -MaximumRetryCount 3 -RetryIntervalSec 5

      - name: Verify SHA-256
        if: (inputs.build_from_source == false || inputs.rstudio_installer_url != '') && steps.resolve.outputs.sha256 != ''
        env:
          EXPECTED_SHA256: ${{ steps.resolve.outputs.sha256 }}
          DOWNLOAD_FILENAME: ${{ steps.resolve.outputs.filename }}
        run: |
          $ErrorActionPreference = 'Stop'
          $expected = $env:EXPECTED_SHA256.ToLower()
          $actual = (Get-FileHash -Algorithm SHA256 $env:DOWNLOAD_FILENAME).Hash.ToLower()
          if ($expected -ne $actual) {
            Write-Error "SHA-256 mismatch. Expected: $expected. Actual: $actual."
            exit 1
          }
          Write-Host "SHA-256 OK: $actual"

      - name: Install RStudio from .exe
        if: inputs.build_from_source == false || inputs.rstudio_installer_url != ''
        env:
          INSTALLER_FILENAME: ${{ steps.resolve.outputs.filename }}
        run: |
          $ErrorActionPreference = 'Stop'
          $p = Start-Process -FilePath ".\$env:INSTALLER_FILENAME" -ArgumentList '/S' -Wait -PassThru
          if ($p.ExitCode -ne 0) { Write-Error "RStudio installer exited $($p.ExitCode)"; exit 1 }
          $exe = 'C:\Program Files\RStudio\rstudio.exe'
          if (-not (Test-Path $exe)) {
            Write-Error "RStudio binary not found at $exe after install."
            exit 1
          }
          Get-Item $exe | Format-List FullName, Length, LastWriteTime

      - name: Install e2e test dependencies
        uses: ./.github/actions/e2e-deps
        with:
          r-libs-user: ${{ env.R_LIBS_USER }}

      - name: Run Playwright tests
        working-directory: e2e/rstudio
        env:
          PW_RSTUDIO_MODE: desktop
          PW_PROJECT_NAME: ${{ inputs.project }}
          PW_GREP: ${{ inputs.grep }}
          PW_GREP_INVERT: ${{ inputs.grep_invert }}
          PW_TEST_SELECTOR: ${{ inputs.test_selector }}
          PW_TEST_IGNORE: ${{ inputs.test_ignore }}
          PW_RSTUDIO_EXTRA_ARGS: ${{ inputs.rstudio_extra_args }}
          PW_DEBUG_LAUNCH: '1'
          # Tells playwright.config.ts to switch to blob reporter for this shard.
          PW_SHARD: ${{ matrix.shard }}
          # E2E Test Insights reporter: posts per-shard results to the dashboard.
          # CONNECT_API_KEY is empty on fork PRs; reporter runs but uploads fail
          # with warnings (never fails the run).
          CONNECT_API_KEY: ${{ secrets.CONNECT_API_KEY }}
          SHARD_NAME: desktop-win-${{ matrix.shard }}
        run: |
          $ErrorActionPreference = 'Stop'
          $pwArgs = @()
          if (-not [string]::IsNullOrEmpty($env:PW_TEST_SELECTOR)) {
            $pwArgs += ($env:PW_TEST_SELECTOR -split '\s+' | Where-Object { $_ -ne '' })
          }
          $pwArgs += '--project'
          $pwArgs += $env:PW_PROJECT_NAME
          if (-not [string]::IsNullOrEmpty($env:PW_GREP)) {
            $pwArgs += '--grep'
            $pwArgs += $env:PW_GREP
          }
          if (-not [string]::IsNullOrEmpty($env:PW_GREP_INVERT)) {
            $pwArgs += '--grep-invert'
            $pwArgs += $env:PW_GREP_INVERT
          }
          $pwArgs += '--shard'
          $pwArgs += "$($env:PW_SHARD)/${{ strategy.job-total }}"
          npx playwright test $pwArgs

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-report-win-${{ matrix.shard }}
          path: e2e/rstudio/blob-report/
          if-no-files-found: warn
          retention-days: 1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: e2e/rstudio/playwright-report/
          retention-days: 15
          if-no-files-found: ignore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: e2e/rstudio/test-results/
          retention-days: 15
          if-no-files-found: ignore

      - name: Upload RStudio session logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rstudio-logs-shard-${{ matrix.shard }}
          path: ${{ env.APPDATA }}\RStudio\
          retention-days: 15
          if-no-files-found: ignore

      - name: Upload PW sandbox (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pw-sandbox-shard-${{ matrix.shard }}
          path: ${{ github.workspace }}\pw-sandbox\
          retention-days: 15
          if-no-files-found: ignore

      # Windows writes application crash dumps here; useful when RStudio
      # aborts before the GWT-ready handshake.
      - name: Upload Windows crash dumps (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-crash-dumps-shard-${{ matrix.shard }}
          path: ${{ env.LOCALAPPDATA }}\CrashDumps\
          retention-days: 15
          if-no-files-found: ignore

  # Merge per-shard blob reports into a single HTML report, parse aggregated
  # counts, and post a sticky PR comment with pass/fail/skip totals
  # (when post_pr_comment is set).
  e2e-merge:
    needs: [e2e-desktop-windows]
    if: always() && needs.e2e-desktop-windows.result != 'skipped' && needs.e2e-desktop-windows.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: e2e/rstudio/package-lock.json

      - name: Install Playwright
        working-directory: e2e/rstudio
        run: npm ci --ignore-scripts

      - name: Download shard blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-blob-report-win-*
          path: e2e/rstudio/all-blob-reports
          merge-multiple: true

      - name: Merge shard reports
        working-directory: e2e/rstudio
        run: |
          if [ -z "$(ls -A all-blob-reports 2>/dev/null)" ]; then
            echo "::error::No blob reports found -- both shards failed to produce artifacts"
            exit 1
          fi
          cat > merge.config.ts <<'EOF'
          import { defineConfig } from '@playwright/test';
          export default defineConfig({
            reporter: [
              ['html', { outputFolder: 'playwright-report', open: 'never' }],
              ['json', { outputFile: 'playwright-report/test-results.json' }],
            ],
          });
          EOF
          npx playwright merge-reports --config merge.config.ts ./all-blob-reports

      - name: Parse aggregated results
        id: summary
        if: always()
        run: |
          FILE="e2e/rstudio/playwright-report/test-results.json"
          if [ -f "$FILE" ]; then
            if ! PASSED=$(jq '[.suites[] | recurse(.suites[]?) | .specs[]? | select(.ok == true and (.tests[0].status // "expected") != "flaky" and (.tests[0].status // "expected") != "skipped")] | length' "$FILE"); then
              echo "::error::Failed to parse test-results.json (PASSED)"; exit 1
            fi
            if ! FAILED=$(jq '[.suites[] | recurse(.suites[]?) | .specs[]? | select(.ok == false)] | length' "$FILE"); then
              echo "::error::Failed to parse test-results.json (FAILED)"; exit 1
            fi
            if ! SKIPPED=$(jq '[.suites[] | recurse(.suites[]?) | .specs[]?.tests[]? | select(.status == "skipped")] | length' "$FILE"); then
              echo "::error::Failed to parse test-results.json (SKIPPED)"; exit 1
            fi
            if ! FLAKY=$(jq '[.suites[] | recurse(.suites[]?) | .specs[]?.tests[]? | select(.status == "flaky")] | length' "$FILE"); then
              echo "::error::Failed to parse test-results.json (FLAKY)"; exit 1
            fi
          else
            PASSED=0; FAILED=0; SKIPPED=0; FLAKY=0
          fi
          TOTAL=$((PASSED + FAILED))
          if [ "$TOTAL" -gt 0 ]; then
            RATE=$(( (PASSED * 100) / TOTAL ))
            FILLED=$(( (RATE * 20) / 100 ))
            EMPTY=$(( 20 - FILLED ))
            BAR=""
            [ "$FILLED" -gt 0 ] && BAR=$(printf '█%.0s' $(seq 1 $FILLED))
            [ "$EMPTY"  -gt 0 ] && BAR="${BAR}$(printf '░%.0s' $(seq 1 $EMPTY))"
          else
            RATE=0; BAR="░░░░░░░░░░░░░░░░░░░░"
          fi
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "flaky=$FLAKY" >> "$GITHUB_OUTPUT"
          echo "rate=$RATE" >> "$GITHUB_OUTPUT"
          echo "bar=$BAR" >> "$GITHUB_OUTPUT"

      - name: Upload merged Playwright report
        id: upload-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-win
          path: e2e/rstudio/playwright-report/
          retention-days: 15
          if-no-files-found: ignore

      - name: Post E2E results to PR
        if: |
          always() &&
          inputs.post_pr_comment == true &&
          github.event.pull_request.head.repo.fork == false &&
          (steps.summary.outputs.passed != '0' || steps.summary.outputs.failed != '0' || steps.summary.outputs.skipped != '0' || steps.summary.outputs.flaky != '0')
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: e2e-windows-2025-results
          GITHUB_TOKEN: ${{ github.token }}
          message: |
            ## 🪟 Windows Desktop E2E · Server 2025 x64

            ${{ needs.e2e-desktop-windows.result == 'success' && steps.summary.outputs.failed == '0' && '### ✅ All tests passed!' || format('### ❌ {0} test(s) failed', steps.summary.outputs.failed) }}

            `${{ steps.summary.outputs.bar }}` **${{ steps.summary.outputs.rate }}%** pass rate

            | ✅ Passed | ❌ Failed | ⚠️ Skipped | 🔁 Flaky |
            | :---: | :---: | :---: | :---: |
            | **${{ steps.summary.outputs.passed }}** | **${{ steps.summary.outputs.failed }}** | **${{ steps.summary.outputs.skipped }}** | **${{ steps.summary.outputs.flaky }}** |

            <details>
            <summary>📥 Download Playwright report</summary>

            **[⬇️ playwright-report.zip](${{ steps.upload-report.outputs.artifact-url }})** — extract and open `index.html`

            > Includes screenshots, traces, and step-by-step details for every test. Expires in 15 days.

            </details>

            ---
            <sub>2 shards · Windows Server 2025 x64 · commit <code>${{ github.event.pull_request.head.sha }}</code> · <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">Run #${{ github.run_number }}</a></sub>
