name: "Cache: Seed macOS 26 ARM64 build caches"

# Seeds the build caches (rstudio-tools, build-time R packages, and sccache)
# on the default branch so that PR builds start warm. GitHub Actions caches
# are scoped per-branch: a cache can only be restored from the same branch,
# the PR's base branch, or the default branch. Sibling branches / PRs cannot
# see each other's caches. By running the build job on main, the caches it
# saves land in main's scope, which every PR (based on main) can then restore
# via the restore-keys prefixes (rstudio-tools-arm64-, etc.). Without this,
# every new PR branch starts 100% cold on its first build.
on:
  # Re-seed when files under dependencies/ change. This glob is deliberately a
  # broad superset of the exact hashFiles() patterns that feed the cache keys
  # (see the build workflow), so the trigger paths don't have to stay in
  # lockstep with those patterns. Most edits here re-run the seed without
  # changing any key (a no-op refresh); an edit that touches one of the hashed
  # files additionally rotates the affected key, saving a fresh cache on main.
  push:
    branches: [main]
    paths:
      - "dependencies/**"
      - ".github/workflows/os-test-e2e-rstudio-desktop-os-macos-26-arm64.yml"
      - ".github/workflows/os-cache-seed-e2e-macos-26-arm64.yml"
  # Nightly re-seed keeps the sccache object cache (keyed per-commit, restored
  # by prefix) recent on main so PR builds get a high compile-cache hit rate.
  schedule:
    - cron: '0 7 * * *'
  # Also dispatched by os-cache-seed-sentinel.yml when this seed's caches
  # have been evicted from main's scope (10 GB repo quota, LRU eviction).
  workflow_dispatch:

# Don't stack expensive macOS builds; the latest seed run wins.
concurrency:
  group: cache-seed-macos-26-arm64
  cancel-in-progress: true

permissions:
  contents: read
  # Required so this workflow can pass pull-requests: write to the called
  # workflow's e2e-merge job (GitHub validates ALL job-level permissions in the
  # called workflow at call time). The e2e-merge job is skipped when
  # build_only=true (the only mode the cache seeder uses), so this permission
  # is never exercised here — it's declared only to satisfy the validator.
  pull-requests: write
  # Likewise required only by the validator: the called workflow's e2e-merge
  # job declares id-token: write for the OIDC S3 report upload, which never
  # runs in build_only mode.
  id-token: write

jobs:
  seed:
    uses: ./.github/workflows/os-test-e2e-rstudio-desktop-os-macos-26-arm64.yml
    secrets:
      CONNECT_API_KEY: ${{ secrets.CONNECT_API_KEY }}
    with:
      build_only: true
