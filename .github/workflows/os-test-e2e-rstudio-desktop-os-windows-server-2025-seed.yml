name: "Cache Seed: E2E Playwright RStudio (Desktop, Windows Server 2025 x64, Open Source)"

# Runs weekly to keep the sccache and rstudio-tools caches alive (GitHub
# evicts caches after 7 days of inactivity). Without this, the first PR run
# after a quiet week would be a full cold build (~90 min instead of ~20 min).
on:
  schedule:
    # Every Monday at 04:00 UTC -- before the work week starts.
    - cron: '0 4 * * 1'
  workflow_dispatch:

concurrency:
  group: pw-seed-windows-2025
  cancel-in-progress: false

permissions:
  contents: read
  # Required for call-time validation: the called workflow's e2e-merge job
  # declares pull-requests: write. GitHub validates all declared permissions at
  # call time even for jobs that will be skipped (build_only=true skips e2e-merge).
  pull-requests: write
  # Likewise required only by the validator: e2e-merge declares id-token: write
  # for the OIDC S3 report upload, which never runs in build_only mode.
  id-token: write

jobs:
  seed-windows-2025:
    uses: ./.github/workflows/os-test-e2e-rstudio-desktop-os-windows-server-2025.yml
    secrets:
      # The seed is the main writer of the shared S3 sccache; without this
      # it would fall back to the quota-constrained GHA cache backend.
      AWS_SCCACHE_ROLE_ARN: ${{ secrets.AWS_SCCACHE_ROLE_ARN }}
    with:
      build_from_source: true
      build_only: true
      r_version: "release"
