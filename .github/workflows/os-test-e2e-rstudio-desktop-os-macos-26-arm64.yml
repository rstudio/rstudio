name: "Test: E2E Playwright RStudio (Desktop, macOS 26 ARM64, Open Source)"

on:
  workflow_dispatch:
    inputs:
      build_from_source:
        description: "Build RStudio Desktop from this branch's source. When false, downloads the latest daily .dmg installer."
        type: boolean
        default: true
      rstudio_installer_url:
        description: "Optional .dmg URL to test against (e.g. a specific daily from dailies.rstudio.com). Only used when build_from_source is false. Leave empty to auto-resolve the latest daily."
        type: string
        default: ""
      r_version:
        description: "R version to install via rig (e.g. 'release', 'oldrel', 'devel', '4.4.1')."
        type: string
        default: "release"
      project:
        description: "Playwright project to run: 'desktop' or 'server'. OS and edition are auto-filtered from the host platform and PW_RSTUDIO_EDITION."
        type: string
        default: "desktop"
      grep:
        description: "Optional Playwright --grep pattern to run only tests whose title matches."
        type: string
        default: ""
      test_selector:
        description: "Optional test paths/files/directories to run (space-separated). Matched as substrings against test file paths. Examples: 'autocomplete.test.ts', 'tests/panes/misc/', 'autocomplete tests/panes/posit-assistant-chat/'. Leave empty to run all tests."
        type: string
        default: ""
      test_ignore:
        description: "Optional test paths/files/directories to exclude (space-separated globs). Examples: '**/code_suggestions.test.ts', '**/posit-assistant-chat/**'. Leave empty to exclude nothing."
        type: string
        default: ""
      grep_invert:
        description: "Optional Playwright --grep-invert pattern to skip tests by title. Defaults to '@ai' to skip tests that require credentials not available in unattended runs."
        type: string
        default: "@ai"
      rstudio_extra_args:
        description: "Optional extra args passed to RStudio Desktop on launch (space-separated). Maps to PW_RSTUDIO_EXTRA_ARGS."
        type: string
        default: ""
      build_only:
        description: "Run only the build job (to seed the rstudio-tools / R-libs / sccache caches) and skip the e2e job."
        type: boolean
        default: false
      post_pr_comment:
        description: "Post test results as a sticky comment on the PR. Pass true only from PR-triggered callers."
        type: boolean
        default: false
  workflow_call:
    inputs:
      build_from_source:
        type: boolean
        default: true
      rstudio_installer_url:
        type: string
        default: ""
      r_version:
        type: string
        default: "release"
      project:
        type: string
        default: "desktop"
      grep:
        type: string
        default: ""
      test_selector:
        type: string
        default: ""
      test_ignore:
        type: string
        default: ""
      grep_invert:
        type: string
        default: "@ai"
      rstudio_extra_args:
        type: string
        default: ""
      build_only:
        type: boolean
        default: false
      post_pr_comment:
        type: boolean
        default: false
    secrets:
      OP_SERVICE_ACCOUNT_TOKEN:
        description: >-
          1Password service account token used to fetch CONNECT_API_KEY (E2E
          Test Insights reporter) and Posit AI account credentials (email /
          password consumed by @ai-tagged tests). Empty on fork PRs; the
          1Password step is then skipped and the dependent features degrade
          gracefully (reporter uploads warn, @ai tests skip with reason).
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  # Builds RStudio Desktop from this PR's source on the same runner image as
  # the e2e job below, then uploads RStudio.app as an artifact for the e2e
  # job to consume. Skipped when build_from_source is false, in which case
  # the e2e job downloads the daily .dmg (or rstudio_installer_url) instead.
  build:
    if: inputs.build_from_source == true && inputs.rstudio_installer_url == ''
    runs-on: macos-26
    timeout-minutes: 90
    env:
      # The dependency / package scripts default RSTUDIO_TOOLS_ROOT to /opt,
      # which isn't writable on hosted runners without sudo. Redirect to a
      # workspace-local path that we can also cache.
      RSTUDIO_TOOLS_ROOT: ${{ github.workspace }}/opt/rstudio-tools/arm64
      # Pin R's user library to a workspace-local path so we can cache it.
      # R expands %p/%v at startup to the platform triple and major.minor
      # version (e.g. aarch64-apple-darwin20/4.5), which keeps libraries
      # built for different R versions / platforms in separate subtrees.
      R_LIBS_USER: ${{ github.workspace }}/R-libs/%p/%v
      SCCACHE_ENABLED: '1'
      SCCACHE_GHA_ENABLED: 'true'
      NPM_CONFIG_LOGLEVEL: error
      NPM_CONFIG_AUDIT: 'false'
    steps:
      - uses: actions/checkout@v4

      # Pre-built tool deps (Boost, SOCI, pandoc, quarto, GWT, node, panmirror,
      # copilot-language-server, etc.) all land under RSTUDIO_TOOLS_ROOT.
      # Caching this directory turns the install-common step from ~5-10 min
      # of downloads into a no-op on warm runs.
      - name: Cache rstudio-tools deps
        id: tools-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.RSTUDIO_TOOLS_ROOT }}
          key: rstudio-tools-arm64-${{ hashFiles('dependencies/common/install-*', 'dependencies/osx/install-*', 'dependencies/tools/rstudio-tools.sh') }}
          restore-keys: |
            rstudio-tools-arm64-

      # The "Install build dependencies" step below calls install-packages,
      # which renv::install()s digest/purrr/rmarkdown/testthat/xml2/yaml into
      # R_LIBS_USER. Cache the whole R-libs tree -- R's %p/%v subpaths keep
      # different versions / platforms isolated automatically.
      - name: Cache build-time R packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/R-libs
          key: rstudio-build-rlibs-arm64-${{ hashFiles('dependencies/common/install-packages', 'dependencies/common/lockfiles/**/renv.lock') }}
          restore-keys: |
            rstudio-build-rlibs-arm64-

      # Cache compiled GWT output (package/osx/build-arm64/gwt/{bin,www,extras}).
      # GWT compilation is the single most expensive JS step (~15-30 min). When
      # GWT Java sources / build scripts haven't changed, cmake skips
      # recompilation via --build-gwt=0 and uses the cached output directly.
      # Restore-only here; the matching Save GWT output step runs after the build
      # with if: always() so the cache is written even when a later step fails.
      - name: Restore GWT output
        id: gwt-cache
        uses: actions/cache/restore@v4
        with:
          path: package/osx/build-arm64/gwt
          key: rstudio-gwt-arm64-v2-${{ hashFiles('src/gwt/src/**', 'src/gwt/acesupport/**', 'src/gwt/lib/**', 'src/gwt/build.xml', 'src/gwt/conf/**') }}
          restore-keys: |
            rstudio-gwt-arm64-v2-
      # install-dependencies-osx (the entry-point script) builds both arm64
      # and x86_64 dependencies on an M1 Mac, which we don't need. Call the
      # per-arch script directly to install only arm64 brew formulae; that
      # script also chains into dependencies/common/install-common at the
      # end, so this single step covers brew formulae + Boost + SOCI + GWT
      # + node + pandoc/quarto + panmirror + copilot-language-server +
      # sccache + dictionaries + mathjax.
      - name: Install build dependencies
        working-directory: dependencies/osx
        run: ./install-dependencies-osx-arch

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696  # v0.0.10

      - name: Build RStudio Desktop (arm64)
        id: build
        working-directory: package/osx
        env:
          RSTUDIO_VERSION_MAJOR: '99'
          RSTUDIO_VERSION_MINOR: '9'
          RSTUDIO_VERSION_PATCH: '9'
          RSTUDIO_VERSION_SUFFIX: "-pr+${{ github.run_number }}"
        run: |
          if [ "${{ steps.gwt-cache.outputs.cache-hit }}" = "true" ]; then
            ./make-package --arch=arm64 --build-dmg=0 --use-creds=0 --build-gwt=0
          else
            ./make-package --arch=arm64 --build-dmg=0 --use-creds=0
          fi

      - name: Save GWT output
        if: steps.build.conclusion == 'success'
        uses: actions/cache/save@v4
        with:
          path: package/osx/build-arm64/gwt
          key: ${{ steps.gwt-cache.outputs.cache-primary-key }}

      # tar (not zip) to preserve symlinks and executable permissions in the
      # bundle. upload-artifact would otherwise zip the directory tree itself
      # and break codesigned binaries on the way back out.
      #
      # Skipped in build_only (seed) runs: no e2e job consumes the artifact
      # there, so packaging and uploading it would be pure waste (a large
      # artifact produced and retained on every nightly seed for nothing).
      - name: Package RStudio.app
        if: inputs.build_only != true
        working-directory: package/osx/install
        run: tar -czf "${{ github.workspace }}/RStudio.app.tar.gz" RStudio.app

      - name: Upload RStudio.app artifact
        if: inputs.build_only != true
        uses: actions/upload-artifact@v4
        with:
          name: rstudio-app-macos-arm64
          path: RStudio.app.tar.gz
          retention-days: 7

  e2e-desktop-macos:
    needs: build
    # build is skipped when build_from_source is false; allow this job to
    # run in that case too. needs.build.result is "success" on a normal run
    # and "skipped" on the daily-download path. build_only seeds the build
    # caches (rstudio-tools / R-libs / sccache) without running e2e, so skip.
    if: |
      always() &&
      inputs.build_only != true &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    runs-on: macos-26
    timeout-minutes: 120
    env:
      R_LIBS_USER: ${{ github.workspace }}/R-libs
      # Pin the sandbox parent so the upload-artifact step below knows where
      # rsession logs / preserved per-spec config trees end up after a failed
      # run. globalSetup honors this and auto-creates the directory
      # (PW_SANDBOX_ROOT_CREATE=1).
      PW_SANDBOX_ROOT: ${{ github.workspace }}/pw-sandbox
      PW_SANDBOX_ROOT_CREATE: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: e2e/rstudio/package-lock.json

      - name: Install rig
        run: |
          curl -fLs -o rig.pkg https://github.com/r-lib/rig/releases/download/latest/rig-latest-macOS-arm64.pkg
          sudo installer -pkg rig.pkg -target /

      - name: Install R via rig
        env:
          R_VERSION: ${{ inputs.r_version }}
        run: |
          rig add "$R_VERSION"
          # rig names installs with arch/major.minor on macOS (e.g. "4.4-arm64"),
          # not the requested patch or alias. Query rig for the just-installed
          # name so `rig default` works regardless of input form.
          INSTALLED_NAME=$(rig list --json | jq -r '.[-1].name')
          rig default "$INSTALLED_NAME"
          rig ls
          mkdir -p "$R_LIBS_USER"

      # Build-from-source path: extract the RStudio.app artifact produced by
      # the build job above.
      - name: Download RStudio.app artifact
        if: inputs.build_from_source == true && inputs.rstudio_installer_url == ''
        uses: actions/download-artifact@v4
        with:
          name: rstudio-app-macos-arm64
          path: ${{ github.workspace }}

      - name: Install RStudio from artifact
        if: inputs.build_from_source == true && inputs.rstudio_installer_url == ''
        run: |
          tar -xzf "${{ github.workspace }}/RStudio.app.tar.gz" -C "${{ github.workspace }}"
          sudo rm -rf /Applications/RStudio.app
          sudo cp -R "${{ github.workspace }}/RStudio.app" /Applications/
          sudo xattr -cr /Applications/RStudio.app
          ls -la /Applications/RStudio.app/Contents/MacOS/RStudio

      # Daily-download path: resolve and install the latest (or specified) .dmg.
      # Runs when build_from_source is false or an explicit URL was provided.
      - name: Resolve RStudio .dmg URL
        if: inputs.build_from_source == false || inputs.rstudio_installer_url != ''
        id: resolve
        env:
          INSTALLER_URL: ${{ inputs.rstudio_installer_url }}
        run: |
          URL="$INSTALLER_URL"
          SHA=""
          FILENAME=""
          if [ -z "$URL" ]; then
            MANIFEST=$(curl -fsSL --retry 3 --retry-delay 5 'https://dailies.rstudio.com/rstudio/latest/index.json')
            # The daily manifest publishes a single universal macOS build
            # under the "macos" platform key (architecture: universal). There
            # are no separate "mac-arm64" / "mac" entries.
            URL=$(echo "$MANIFEST" | jq -r '.products.electron.platforms.macos.link // empty')
            SHA=$(echo "$MANIFEST" | jq -r '.products.electron.platforms.macos.sha256 // empty')
            FILENAME=$(echo "$MANIFEST" | jq -r '.products.electron.platforms.macos.filename // empty')
            if [ -z "$URL" ] || [ -z "$FILENAME" ] || [ -z "$SHA" ]; then
              echo "::error::Daily manifest is missing expected fields (url='$URL', filename='$FILENAME', sha256='$SHA'). The schema at https://dailies.rstudio.com/rstudio/latest/index.json may have changed."
              exit 1
            fi
            echo "Auto-resolved latest macOS daily:"
            echo "  URL:      $URL"
            echo "  SHA-256:  $SHA"
            echo "  Filename: $FILENAME"
          else
            FILENAME=$(basename "$URL")
            if [ -z "$FILENAME" ]; then
              echo "::error::Could not derive filename from rstudio_installer_url='$URL'. Provide a URL whose path ends with a filename (e.g. .../RStudio-2024.12.0-467.dmg)."
              exit 1
            fi
            echo "Using override URL: $URL (SHA-256 verification skipped)"
          fi
          echo "url=$URL"      >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA"   >> "$GITHUB_OUTPUT"
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"

      - name: Cache RStudio installer
        if: inputs.build_from_source == false && inputs.rstudio_installer_url == ''
        id: installer-cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.resolve.outputs.filename }}
          key: rstudio-installer-${{ steps.resolve.outputs.filename }}

      - name: Download RStudio .dmg
        if: (inputs.build_from_source == false || inputs.rstudio_installer_url != '') && steps.installer-cache.outputs.cache-hit != 'true'
        env:
          DOWNLOAD_URL: ${{ steps.resolve.outputs.url }}
          DOWNLOAD_FILENAME: ${{ steps.resolve.outputs.filename }}
        run: |
          curl -fsSL --retry 3 --retry-delay 5 \
            -o "$DOWNLOAD_FILENAME" \
            "$DOWNLOAD_URL"

      - name: Verify SHA-256
        if: (inputs.build_from_source == false || inputs.rstudio_installer_url != '') && steps.resolve.outputs.sha256 != ''
        env:
          EXPECTED_SHA256: ${{ steps.resolve.outputs.sha256 }}
          DOWNLOAD_FILENAME: ${{ steps.resolve.outputs.filename }}
        run: |
          expected=$(echo "$EXPECTED_SHA256" | tr '[:upper:]' '[:lower:]')
          actual=$(shasum -a 256 "$DOWNLOAD_FILENAME" | awk '{print $1}')
          if [ "$expected" != "$actual" ]; then
            echo "::error::SHA-256 mismatch. Expected: $expected. Actual: $actual."
            exit 1
          fi

      - name: Install RStudio from .dmg
        if: inputs.build_from_source == false || inputs.rstudio_installer_url != ''
        env:
          INSTALLER_FILENAME: ${{ steps.resolve.outputs.filename }}
        run: |
          MOUNT=$(hdiutil attach -nobrowse -readonly "$INSTALLER_FILENAME" | grep -oE '/Volumes/.*' | tail -1)
          if [ -z "$MOUNT" ]; then
            echo "ERROR: failed to resolve mount path from hdiutil" >&2
            exit 1
          fi
          echo "Mounted at: $MOUNT"
          sudo cp -R "$MOUNT/RStudio.app" /Applications/
          hdiutil detach "$MOUNT"
          sudo xattr -cr /Applications/RStudio.app
          ls -la /Applications/RStudio.app/Contents/MacOS/RStudio

      - name: Install e2e test dependencies
        uses: ./.github/actions/e2e-deps
        with:
          r-libs-user: ${{ env.R_LIBS_USER }}

      # Probe whether the 1Password service-account token is configured without
      # exposing the secret value to the job env -- the `secrets` context is
      # not available in step-level `if:` expressions, so we surface a plain
      # boolean output instead. Empty on fork PRs and on repos that haven't
      # configured the secret; the Load step below is then skipped and
      # downstream features degrade gracefully (reporter warns, @ai tests
      # skip with reason).
      - name: Check for 1Password token
        id: op_token_check
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
        run: |
          if [ -n "$OP_SERVICE_ACCOUNT_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      # Fetch CONNECT_API_KEY (E2E Test Insights reporter) and the Posit AI
      # account creds (email/password consumed by @ai-tagged tests) from
      # 1Password. The GitHub secret holds only the 1Password service account
      # token; the dashboard key and account creds live in 1Password so they
      # can be rotated without re-issuing GitHub secrets. `export-env: true`
      # exposes each entry as an env var of the same name to subsequent steps
      # (and masks them in logs).
      #
      # OP_SERVICE_ACCOUNT_TOKEN is scoped to this step only -- it's a vault
      # credential with broader reach than the per-entry secrets it fetches,
      # so we keep it out of the job env to avoid surfacing it to later
      # steps that execute PR-controlled code (the Playwright test runner).
      - name: Load secrets from 1Password
        if: steps.op_token_check.outputs.present == 'true'
        uses: 1password/load-secrets-action@dafbe7cb03502b260e2b2893c753c352eee545bf # v3.2.1
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          # E2E Test Insights reporter (posts results to the Connect dashboard).
          CONNECT_API_KEY: "op://RStudio OSS GitHub Actions/CONNECT_API_KEY/credential"
          # Posit AI account credentials used by @ai-tagged Playwright tests.
          # Account: posit-ai-test-rstudio@posit.co (https://posit.ai).
          POSIT_AI_EMAIL: "op://RStudio OSS GitHub Actions/Login/username"
          POSIT_AI_PASSWORD: "op://RStudio OSS GitHub Actions/Login/password"

      - name: Run Playwright tests
        working-directory: e2e/rstudio
        env:
          PW_RSTUDIO_MODE: desktop
          PW_PROJECT_NAME: ${{ inputs.project }}
          PW_GREP: ${{ inputs.grep }}
          PW_GREP_INVERT: ${{ inputs.grep_invert }}
          PW_TEST_SELECTOR: ${{ inputs.test_selector }}
          PW_TEST_IGNORE: ${{ inputs.test_ignore }}
          PW_RSTUDIO_EXTRA_ARGS: ${{ inputs.rstudio_extra_args }}
          # Tells playwright.config.ts to switch to blob reporter for this shard.
          PW_SHARD: ${{ matrix.shard }}
          # SHARD_NAME makes each shard's run id unique so shards don't
          # overwrite each other. CONNECT_API_KEY / POSIT_AI_* are inherited
          # from the "Load secrets from 1Password" step above (empty when the
          # 1Password service account token isn't available, e.g. fork PRs --
          # the reporter then warns on upload and @ai tests skip with reason).
          SHARD_NAME: desktop-mac-${{ matrix.shard }}
          # Print the GWT launch timeline so the next launch failure shows
          # which phase exceeded the deadline (CDP-connect vs. bridge-installed
          # vs. ready-flag vs. console-visible).
          PW_DEBUG_LAUNCH: '1'
        run: |
          ARGS=()
          if [ -n "$PW_TEST_SELECTOR" ]; then
            set -f
            ARGS+=($PW_TEST_SELECTOR)
            set +f
          fi
          ARGS+=(--project "$PW_PROJECT_NAME")
          if [ -n "$PW_GREP" ]; then
            ARGS+=(--grep "$PW_GREP")
          fi
          if [ -n "$PW_GREP_INVERT" ]; then
            ARGS+=(--grep-invert "$PW_GREP_INVERT")
          fi
          ARGS+=(--shard="${{ matrix.shard }}/${{ strategy.job-total }}")
          npx playwright test "${ARGS[@]}"

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-blob-report-mac-${{ matrix.shard }}
          path: e2e/rstudio/blob-report/
          if-no-files-found: warn
          retention-days: 1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.shard }}
          path: e2e/rstudio/test-results/
          if-no-files-found: ignore

      # Preserved per-spec sandbox tree on failure -- includes rsession logs,
      # the spec's RStudio config / data home, and per-test working dirs.
      # globalTeardown leaves this in place when any test failed; if every
      # test passed the directory is gone and `if-no-files-found: ignore`
      # silently skips upload.
      - name: Upload PW sandbox (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pw-sandbox-${{ matrix.shard }}
          path: ${{ github.workspace }}/pw-sandbox/
          if-no-files-found: ignore

      # macOS writes Electron / rsession crash reports here; useful when a
      # launch fails because the renderer or session process aborted before
      # the GWT-ready handshake.
      - name: Upload macOS diagnostic reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-diagnostic-reports-${{ matrix.shard }}
          path: ~/Library/Logs/DiagnosticReports/
          if-no-files-found: ignore

  # Merge per-shard blob reports into a single HTML report, parse aggregated
  # counts, and post a sticky PR comment with pass/fail/skip totals
  # (when post_pr_comment is set).
  e2e-merge:
    needs: [e2e-desktop-macos]
    if: always() && needs.e2e-desktop-macos.result != 'skipped' && needs.e2e-desktop-macos.result != 'cancelled'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: e2e/rstudio/package-lock.json

      - name: Install Playwright
        working-directory: e2e/rstudio
        run: npm ci --ignore-scripts

      - name: Download shard blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-blob-report-mac-*
          path: e2e/rstudio/all-blob-reports
          merge-multiple: true

      - name: Merge shard reports
        working-directory: e2e/rstudio
        run: |
          if [ -z "$(ls -A all-blob-reports 2>/dev/null)" ]; then
            echo "::error::No blob reports found -- both shards failed to produce artifacts"
            exit 1
          fi
          cat > merge.config.ts <<'EOF'
          import { defineConfig } from '@playwright/test';
          export default defineConfig({
            reporter: [
              ['html', { outputFolder: 'playwright-report', open: 'never' }],
              ['json', { outputFile: 'playwright-report/test-results.json' }],
            ],
          });
          EOF
          npx playwright merge-reports --config merge.config.ts ./all-blob-reports

      - name: Parse aggregated results
        id: summary
        if: always()
        run: |
          FILE="e2e/rstudio/playwright-report/test-results.json"
          if [ -f "$FILE" ]; then
            if ! PASSED=$(jq '[.suites[] | recurse(.suites[]?) | .specs[]? | select(.ok == true and (.tests[0].status // "expected") != "flaky" and (.tests[0].status // "expected") != "skipped")] | length' "$FILE"); then
              echo "::error::Failed to parse test-results.json (PASSED)"; exit 1
            fi
            if ! FAILED=$(jq '[.suites[] | recurse(.suites[]?) | .specs[]? | select(.ok == false)] | length' "$FILE"); then
              echo "::error::Failed to parse test-results.json (FAILED)"; exit 1
            fi
            if ! SKIPPED=$(jq '[.suites[] | recurse(.suites[]?) | .specs[]?.tests[]? | select(.status == "skipped")] | length' "$FILE"); then
              echo "::error::Failed to parse test-results.json (SKIPPED)"; exit 1
            fi
            if ! FLAKY=$(jq '[.suites[] | recurse(.suites[]?) | .specs[]?.tests[]? | select(.status == "flaky")] | length' "$FILE"); then
              echo "::error::Failed to parse test-results.json (FLAKY)"; exit 1
            fi
          else
            PASSED=0; FAILED=0; SKIPPED=0; FLAKY=0
          fi
          TOTAL=$((PASSED + FAILED))
          if [ "$TOTAL" -gt 0 ]; then
            RATE=$(( (PASSED * 100) / TOTAL ))
            FILLED=$(( (RATE * 20) / 100 ))
            EMPTY=$(( 20 - FILLED ))
            BAR=""
            [ "$FILLED" -gt 0 ] && BAR=$(printf '█%.0s' $(seq 1 $FILLED))
            [ "$EMPTY"  -gt 0 ] && BAR="${BAR}$(printf '░%.0s' $(seq 1 $EMPTY))"
          else
            RATE=0; BAR="░░░░░░░░░░░░░░░░░░░░"
          fi
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"
          echo "flaky=$FLAKY" >> "$GITHUB_OUTPUT"
          echo "rate=$RATE" >> "$GITHUB_OUTPUT"
          echo "bar=$BAR" >> "$GITHUB_OUTPUT"

      - name: Upload merged Playwright report
        id: upload-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-mac
          path: e2e/rstudio/playwright-report/
          retention-days: 15
          if-no-files-found: ignore

      - name: Post E2E results to PR
        if: |
          always() &&
          inputs.post_pr_comment == true &&
          github.event.pull_request.head.repo.fork == false &&
          (steps.summary.outputs.passed != '0' || steps.summary.outputs.failed != '0' || steps.summary.outputs.skipped != '0' || steps.summary.outputs.flaky != '0')
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          GITHUB_TOKEN: ${{ github.token }}
          header: e2e-macos-arm64-results
          message: |
            ## 🍎 macOS Desktop E2E · ARM64

            ${{ needs.e2e-desktop-macos.result == 'success' && steps.summary.outputs.failed == '0' && '### ✅ All tests passed!' || format('### ❌ {0} test(s) failed', steps.summary.outputs.failed) }}

            `${{ steps.summary.outputs.bar }}` **${{ steps.summary.outputs.rate }}%** pass rate

            | ✅ Passed | ❌ Failed | ⚠️ Skipped | 🔁 Flaky |
            | :---: | :---: | :---: | :---: |
            | **${{ steps.summary.outputs.passed }}** | **${{ steps.summary.outputs.failed }}** | **${{ steps.summary.outputs.skipped }}** | **${{ steps.summary.outputs.flaky }}** |

            <details>
            <summary>📥 Download Playwright report</summary>

            **[⬇️ playwright-report.zip](${{ steps.upload-report.outputs.artifact-url }})** — extract and open `index.html`

            > Includes screenshots, traces, and step-by-step details for every test. Expires in 15 days.

            </details>

            ---
            <sub>2 shards · macos-26 ARM64 · commit <code>${{ github.event.pull_request.head.sha }}</code> · <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">Run #${{ github.run_number }}</a></sub>
